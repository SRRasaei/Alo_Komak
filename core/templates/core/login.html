<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ورود - الو کمک</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      font-family: Tahoma, sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="card shadow" style="width: 360px;">
    <div class="card-header bg-primary text-white text-center py-4">
      <i class="bi bi-telephone-fill fs-2 d-block mb-2"></i>
      <h5 class="mb-0 fw-bold">الو کمک</h5>
      <small class="opacity-75">سامانه مدیریت خدمات</small>
    </div>
    <div class="card-body p-4">
      {% if form.errors %}
        <div class="alert alert-danger py-2 small">
          <i class="bi bi-exclamation-circle me-1"></i>
          نام کاربری یا رمز عبور اشتباه است.
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">نام کاربری</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" autofocus required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">رمز عبور</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" required>
          </div>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>ورود به سیستم
        </button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
